<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Red Plastic Hyena</title>
  <script>
    (function () {
      if (localStorage.getItem("trph-theme") === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button
    type="button"
    id="theme-toggle"
    class="theme-toggle"
    aria-label="Switch to dark theme"
    aria-pressed="false"
  >
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12.2 2.6a7.4 7.4 0 1 0 8.8 11 6.2 6.2 0 1 1-8.8-11Z" fill="currentColor"/>
    </svg>
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4.2" fill="currentColor"/>
      <path d="M12 1.8v2.6M12 19.6v2.6M4.2 12H1.6M22.4 12h-2.6M5.5 5.5 3.7 3.7M20.3 20.3l-1.8-1.8M18.5 5.5l1.8-1.8M5.5 18.5l-1.8 1.8" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
    </svg>
  </button>

  <main class="page">
    <header class="face">
      <!-- <h1 class="title">the red plastic hyena</h1> -->

      <button type="button" id="generate" class="red-button" aria-label="Generate phrase">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="red-btn-fill" x1="32" y1="4" x2="32" y2="60" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#ef5350"/>
              <stop offset="100%" stop-color="#8e0000"/>
            </linearGradient>
            <linearGradient id="red-btn-shine" x1="32" y1="10" x2="32" y2="36" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.55"/>
              <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <circle cx="32" cy="32" r="28" fill="url(#red-btn-fill)"/>
          <ellipse cx="32" cy="22" rx="17" ry="11" fill="url(#red-btn-shine)"/>
        </svg>
      </button>

      <svg class="smile-text" viewBox="0 0 280 42" role="img" aria-label="Creative sparks">
        <defs>
          <path id="smile-arc" d="M 14 6 Q 140 40 266 6" fill="none"/>
          <filter id="smile-shadow" x="-10%" y="-10%" width="120%" height="130%">
            <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.22"/>
          </filter>
        </defs>
        <text class="smile-label" filter="url(#smile-shadow)">
          <textPath href="#smile-arc" startOffset="50%" text-anchor="middle">
            CREATIVE SPARKS
          </textPath>
        </text>
      </svg>
    </header>

    <section class="phrase-window" id="phrase-window" aria-label="Phrase list">
      <div class="phrase-stage" id="phrase-stage">
        <ol id="phrases" class="phrases" aria-live="polite"></ol>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
